<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sophia · AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>

:root {
  --page-bg:     #E8E6E3;
  --card-bg:     #FFFFFF;
  --border:      #E2E0DC;
  --border-soft: #EDEBE7;
  --text-1:      #0F0F0E;
  --text-2:      #4A4946;
  --text-3:      #A09D98;
  --accent:      #2655E8;
  --accent-dk:   #1A40C4;
  --accent-lt:   #EEF2FE;
  --accent-md:   #B8C8FA;
  --red:         #E53935;
  --red-lt:      #FFF0F0;
  --user-bg:     linear-gradient(135deg, #2655E8 0%, #1A40C4 100%);
  --user-text:   #FFFFFF;
  --bot-bg:      #F4F3F0;
  --bot-text:    #0F0F0E;
  --radius-msg:  18px;
  --radius-pill: 999px;
  --shadow-card: 0 2px 4px rgba(0,0,0,0.04), 0 20px 60px rgba(0,0,0,0.10);
  --transition:  150ms cubic-bezier(0.4,0,0.2,1);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%;
  font-family: 'Sora', sans-serif;
  background: var(--page-bg);
  color: var(--text-1);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-size: 256px 256px;
  pointer-events: none; z-index: 0;
}

/* ═══════════════════════════════
   SHELL + CARD
═══════════════════════════════ */
.shell {
  position: relative; z-index: 1;
  width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 28px;
}

.card {
  width: 100%; max-width: 1100px;
  height: min(730px, calc(100vh - 56px));
  background: var(--card-bg);
  border-radius: 24px;
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  display: flex; overflow: hidden; position: relative;
}

/* ═══════════════════════════════
   LEFT — AVATAR PANEL  (smaller)
═══════════════════════════════ */
.avatar-panel {
  width: 420px;
  flex-shrink: 0;
  position: relative;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 24px;
  background: #fafafa;
  overflow: hidden;
}

/* grid */
.avatar-panel::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none;
}

/* subtle radial vignette on edges */
.avatar-panel::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(232,230,227,0.55) 100%);
  pointer-events: none;
}

/* brand — top left — only name, no sub title (no duplication) */
.avatar-brand {
  position: absolute; top: 20px; left: 22px; z-index: 2;
}

.avatar-brand-name {
  font-family: 'DM Serif Display', serif;
  font-size: 22px; font-weight: 400;
  color: #0F0F0E; letter-spacing: 0.01em; line-height: 1;
}

.avatar-brand-sub {
  font-size: 9.5px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(0,0,0,0.30); margin-top: 5px;
}

/* live pill — top right */
.avatar-live {
  position: absolute; top: 22px; right: 22px; z-index: 2;
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  border-radius: var(--radius-pill);
  border: 1px solid rgba(34,197,94,0.20);
  background: rgba(34,197,94,0.07);
}

.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #22C55E;
  animation: livePulse 2.4s ease-in-out infinite;
}

@keyframes livePulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
  50%      { box-shadow: 0 0 0 5px rgba(34,197,94,0); }
}

.live-label {
  font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: #16a34a;
}

/* ── CIRCULAR VIDEO FRAME ── */
.video-frame {
  position: relative;
  width: 290px; height: 290px;
  border-radius: 50%;
  overflow: hidden; flex-shrink: 0; z-index: 1;
  background: #060606;
  box-shadow:
    0 0 0 3px rgba(38,85,232,0.50),
    0 0 0 9px rgba(38,85,232,0.12),
    0 0 50px rgba(38,85,232,0.30),
    0 0 100px rgba(38,85,232,0.10);
  transition: box-shadow 0.5s ease;
}

/* idle A + idle B for crossfade loop */
.video-frame video {
  position: absolute;
  width: 100%; height: 106%; top:0; left:0;
  object-fit: cover;
  object-position: center 5%;
  will-change: opacity;
  transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1);
}

#vid-idle-a { opacity:1; z-index:1; }
#vid-idle-b { opacity:0; z-index:2; }
#vid-talk   { opacity:0; z-index:3; }

#vid-talk.active  { opacity:1; }
#vid-idle-a.fade  { opacity:0; }
#vid-idle-b.fade  { opacity:0; }

@keyframes talkRing {
  0%,100% {
    box-shadow:
      0 0 0 3px rgba(38,85,232,0.50),
      0 0 0 9px rgba(38,85,232,0.12),
      0 0 50px rgba(38,85,232,0.30),
      0 0 100px rgba(38,85,232,0.10);
  }
  50% {
    box-shadow:
      0 0 0 4px rgba(80,130,255,0.90),
      0 0 0 16px rgba(38,85,232,0.28),
      0 0 75px rgba(38,85,232,0.60),
      0 0 150px rgba(38,85,232,0.20);
  }
}

.video-frame.talking { animation: talkRing 1s ease-in-out infinite; }

/* speak button */
#speak-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 10px 22px;
  border-radius: var(--radius-pill);
  border: 1px solid rgba(0,0,0,0.10);
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(16px);
  color: var(--text-2);
  font-family: 'Sora', sans-serif;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.10em; text-transform: uppercase;
  cursor: pointer; z-index: 1;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  transition: all var(--transition);
}

#speak-btn:hover {
  background: #fff;
  color: var(--text-1);
  box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  transform: translateY(-1px);
}

#speak-btn.recording {
  background: var(--red-lt);
  border-color: rgba(229,57,53,0.30);
  color: var(--red);
  transform: none;
  animation: speakPulse 1.4s ease-in-out infinite;
}

@keyframes speakPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(229,57,53,0.25); }
  50%      { box-shadow: 0 0 0 10px rgba(229,57,53,0); }
}

.speak-btn-mic { width:13px; height:13px; flex-shrink:0; }

/* ═══════════════════════════════
   DIVIDER
═══════════════════════════════ */
.panel-divider { width: 1px; background: var(--border); flex-shrink: 0; }

/* ═══════════════════════════════
   RIGHT — CHAT PANEL  (bigger)
═══════════════════════════════ */
.chat-panel {
  flex: 1;
  display: flex; flex-direction: column;
  background: var(--card-bg);
  min-width: 0;
}

/* ── CHAT HEADER — no name repetition, just status ── */
.chat-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border-soft);
  flex-shrink: 0;
}

.chat-header-left { display:flex; align-items:center; gap:10px; }

.chat-avatar-sm {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent) 0%, #6B8EF5 100%);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-family: 'DM Serif Display', serif;
  font-size: 14px; font-weight: 400;
  flex-shrink: 0;
}



.chat-header-name {
  font-family: 'DM Serif Display', serif;
  font-size: 15px; font-weight: 400;
  color: var(--text-1); line-height: 1.2;
}

.chat-header-status {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--text-3); font-weight: 400;
  margin-top: 1px;
}

.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #22C55E; flex-shrink: 0;
}

.icon-btn {
  width: 30px; height: 30px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-3);
  transition: background var(--transition), color var(--transition);
}

.icon-btn:hover { background: var(--border-soft); color: var(--text-1); }

/* ── MESSAGES ── */
#chat-wrap {
  flex: 1; overflow-y: auto;
  padding: 20px 20px 8px;
  display: flex; flex-direction: column; gap: 4px;
  min-height: 0; scroll-behavior: smooth;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}

#chat-wrap::-webkit-scrollbar { width: 4px; }
#chat-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* message row */
.msg-row {
  display: flex; align-items: flex-end; gap: 8px;
  animation: msgIn 0.24s cubic-bezier(0.22,1,0.36,1) forwards;
}

.msg-row.user { flex-direction: row-reverse; }
.msg-row.bot  { flex-direction: row; }

/* spacing between consecutive same-sender messages */
.msg-row + .msg-row.user  { margin-top: 2px; }
.msg-row + .msg-row.bot   { margin-top: 2px; }
.msg-row.user + .msg-row.bot,
.msg-row.bot  + .msg-row.user { margin-top: 14px; }

@keyframes msgIn {
  from { opacity:0; transform:translateY(8px) scale(0.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

@keyframes msgReveal {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

.msg-row.bot.reveal { animation: msgReveal 0.40s cubic-bezier(0.22,1,0.36,1) forwards; }

/* bot avatar */
.msg-avatar {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent) 0%, #6B8EF5 100%);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-family: 'DM Serif Display', serif;
  font-size: 11px;
  margin-bottom: 2px;
}

.msg-avatar.ghost { visibility: hidden; } /* spacer for consecutive bot messages */

/* bubble */
.msg-bubble {
  max-width: 72%;
  padding: 11px 15px;
  font-size: 14px; line-height: 1.58; font-weight: 400;
  word-break: break-word;
}

.msg-row.user .msg-bubble {
  background: var(--accent);
  background: linear-gradient(135deg, #2655E8 0%, #1A40C4 100%);
  color: var(--user-text);
  border-radius: var(--radius-msg) var(--radius-msg) 4px var(--radius-msg);
  box-shadow: 0 2px 12px rgba(38,85,232,0.28);
}

.msg-row.bot .msg-bubble {
  background: var(--bot-bg);
  color: var(--bot-text);
  border-radius: var(--radius-msg) var(--radius-msg) var(--radius-msg) 4px;
  border: 1px solid var(--border-soft);
}

.msg-meta {
  display: flex; align-items: center; gap: 4px;
  margin-top: 4px; padding: 0 2px;
}

.msg-row.user .msg-meta { justify-content: flex-end; }
.msg-row.bot  .msg-meta { justify-content: flex-start; padding-left: 36px; }

.msg-time { font-size: 10px; color: var(--text-3); font-weight: 400; }

/* ── JUMPING LETTERS ── */
@keyframes letterJump {
  0%   { opacity: 0; transform: translateY(3px); }
  100% { opacity: 1; transform: translateY(0); }
}

.jump-letter { display:inline-block; opacity:0; animation: letterJump 0.36s cubic-bezier(0.22,1,0.36,1) forwards; }
.jump-space  { display:inline-block; white-space:pre; }

/* ── TYPING INDICATOR ── */
.typing-row {
  display: flex; align-items: flex-end; gap: 8px;
  animation: msgIn 0.24s cubic-bezier(0.22,1,0.36,1) forwards;
  margin-top: 14px;
}

.typing-bubble {
  display: flex; align-items: center; gap: 4px;
  padding: 12px 16px;
  background: var(--bot-bg);
  border-radius: var(--radius-msg) var(--radius-msg) var(--radius-msg) 4px;
  border: 1px solid var(--border-soft);
}

.typing-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-3);
  animation: typingBounce 1.2s ease-in-out infinite;
}

.typing-dot:nth-child(2) { animation-delay:.16s; }
.typing-dot:nth-child(3) { animation-delay:.32s; }

@keyframes typingBounce {
  0%,60%,100% { transform:translateY(0); opacity:0.4; }
  30%          { transform:translateY(-5px); opacity:1; }
}

/* ── EMPTY STATE ── */
.chat-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap: 10px; pointer-events:none; user-select:none;
}

.chat-empty-ring {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--accent-lt);
  border: 1.5px solid var(--accent-md);
  display: flex; align-items: center; justify-content: center;
  color: var(--accent); margin-bottom: 6px;
}

.chat-empty-title {
  font-family: 'DM Serif Display', serif;
  font-size: 17px; font-weight: 400; color: var(--text-1);
}

.chat-empty-sub {
  font-size: 13px; color: var(--text-3); font-weight: 400;
  text-align: center; line-height: 1.55; max-width: 230px;
}

/* ── INPUT ── */
.input-area {
  padding: 12px 16px 16px;
  border-top: 1px solid var(--border-soft);
  flex-shrink: 0; background: var(--card-bg);
}

.input-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--border-soft);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-pill);
  padding: 7px 8px 7px 18px;
  transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
}

.input-row:focus-within {
  border-color: var(--accent-md);
  box-shadow: 0 0 0 3px rgba(38,85,232,0.08);
  background: #fff;
}

#text-input {
  flex:1; border:none; background:transparent;
  font-family:'DM Sans',sans-serif;
  font-size:14px; color:var(--text-1);
  outline:none; font-weight:400; line-height:1.5;
}

#text-input::placeholder { color: var(--text-3); }

#vol-wrap { display:none; align-items:center; gap:2px; height:20px; }
#vol-wrap.active { display:flex; }
.vol-bar-inner { display:flex; align-items:center; gap:2px; }
.vol-stick { width:3px; border-radius:2px; background:var(--accent); height:4px; transition:height 0.05s; }

#chat-mic-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: none; background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text-3); flex-shrink: 0;
  transition: background var(--transition), color var(--transition);
}

#chat-mic-btn:hover { background: var(--border); color: var(--text-1); }
#chat-mic-btn.recording { background: var(--red-lt); color: var(--red); animation: chatMicPulse 1s ease-in-out infinite; }

@keyframes chatMicPulse {
  0%,100% { background: var(--red-lt); }
  50%      { background: #FCA5A5; }
}

#submit-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: none; background: var(--accent);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #fff; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(38,85,232,0.30);
  transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
}

#submit-btn:hover  { background: var(--accent-dk); transform: scale(1.06); box-shadow: 0 4px 14px rgba(38,85,232,0.40); }
#submit-btn:active { transform: scale(0.95); }
#submit-btn:disabled { opacity:0.4; cursor:default; transform:none; box-shadow:none; }

/* ── AUTOPLAY GATE ── */
#tap-gate {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.90);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; z-index: 50; cursor: pointer;
  border-radius: 24px; transition: opacity 0.3s ease;
}

#tap-gate.hidden { opacity:0; pointer-events:none; }

.tap-gate-icon {
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  animation: gateIcon 2s ease-in-out infinite;
  box-shadow: 0 4px 20px rgba(38,85,232,0.35);
}

@keyframes gateIcon {
  0%,100% { box-shadow: 0 4px 20px rgba(38,85,232,0.35), 0 0 0 8px rgba(38,85,232,0.08); }
  50%      { box-shadow: 0 4px 20px rgba(38,85,232,0.35), 0 0 0 18px rgba(38,85,232,0.04); }
}

.tap-gate-icon svg { color:#fff; }
.tap-gate-text { font-family:'DM Serif Display',serif; font-size:16px; font-weight:400; color:var(--text-1); }
.tap-gate-sub  { font-size:12.5px; color:var(--text-3); font-weight:400; }

@media (max-width:700px) {
  .shell { padding:0; }
  .card { flex-direction:column; border-radius:0; height:100vh; max-width:100%; }
  .avatar-panel { width:100%; height:42vh; flex-shrink:0; }
  .video-frame { width:200px; height:200px; }
  .panel-divider { width:100%; height:1px; }
  .chat-panel { flex:1; }
  #tap-gate { border-radius:0; }
}
</style>
</head>
<body>

<div class="shell">
<div class="card">

  <!-- AUTOPLAY GATE -->
  <div id="tap-gate" onclick="unlockAndStart()">
    <div class="tap-gate-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <polygon points="6,4 20,12 6,20" fill="currentColor"/>
      </svg>
    </div>
    <div class="tap-gate-text">Click to start</div>
    <div class="tap-gate-sub">Sophia is ready to talk</div>
  </div>

  <!-- ════ LEFT — AVATAR ════ -->
  <div class="avatar-panel">

    <div class="avatar-brand">
      <div class="avatar-brand-name">Sophia</div>
      <div class="avatar-brand-sub">AI Assistant</div>
    </div>

    <div class="avatar-live">
      <div class="live-dot"></div>
      <div class="live-label">Live</div>
    </div>

    <div class="video-frame" id="video-frame">
      <!-- Two idle copies for seamless crossfade loop -->
      <video id="vid-idle-a" src="/static/idle2.mp4" muted playsinline preload="auto"></video>
      <video id="vid-idle-b" src="/static/idle2.mp4" muted playsinline preload="auto"></video>
      <video id="vid-talk"   src="/static/talk1.mp4" loop muted playsinline preload="auto"></video>
    </div>

    <button id="speak-btn" onclick="toggleSpeakMode()">
      <svg class="speak-btn-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="9"  y1="23" x2="15" y2="23"/>
      </svg>
      <span id="speak-btn-label">Speak with Sophia</span>
    </button>

  </div>

  <div class="panel-divider"></div>

  <!-- ════ RIGHT — CHAT ════ -->
  <div class="chat-panel">

    <!-- Header — no duplicate name, just avatar + status -->
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-avatar-sm">S</div>
        <div class="chat-header-info">
          <div class="chat-header-name">Sophia</div>
          <div class="chat-header-status">
            <div class="status-dot"></div>
            Available now
          </div>
        </div>
      </div>
      <button class="icon-btn" title="Minimize">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <div id="chat-wrap">
      <div class="chat-empty" id="empty-state">
        <div class="chat-empty-ring">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div class="chat-empty-title">Start a conversation</div>
        <div class="chat-empty-sub">Type a message below or click "Speak with Sophia" to talk</div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <div id="vol-wrap">
          <div class="vol-bar-inner">
            <div class="vol-stick" id="vs1"></div>
            <div class="vol-stick" id="vs2"></div>
            <div class="vol-stick" id="vs3"></div>
            <div class="vol-stick" id="vs4"></div>
            <div class="vol-stick" id="vs5"></div>
          </div>
        </div>
        <input id="text-input" type="text" placeholder="Type a message..." autocomplete="off"/>
        <button id="chat-mic-btn" title="Voice input" onclick="toggleChatMic()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="9"  y1="23" x2="15" y2="23"/>
          </svg>
        </button>
        <button id="submit-btn" title="Send" onclick="sendText()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

</div>
</div>

<script>
/* ═══════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════ */
const SILENCE_THR      = 15;
const SILENCE_MS       = 800;
const LETTER_DELAY_MS  = 65;
const LETTER_DUR_MS    = 360;
const LOOP_CROSSFADE   = 1.5;   /* seconds before end to start crossfade */

/* ═══════════════════════════════════════════
   ELEMENT REFS
═══════════════════════════════════════════ */
const vidA       = document.getElementById('vid-idle-a');
const vidB       = document.getElementById('vid-idle-b');
const vidTalk    = document.getElementById('vid-talk');
const videoFrame = document.getElementById('video-frame');
const speakBtn   = document.getElementById('speak-btn');
const speakLabel = document.getElementById('speak-btn-label');
const chatMicBtn = document.getElementById('chat-mic-btn');
const textInput  = document.getElementById('text-input');
const chatWrap   = document.getElementById('chat-wrap');
const volWrap    = document.getElementById('vol-wrap');
const tapGate    = document.getElementById('tap-gate');
const emptyState = document.getElementById('empty-state');
const vSticks    = [vs1,vs2,vs3,vs4,vs5];

/* ═══════════════════════════════════════════
   SMOOTH LOOPING IDLE — dual-video crossfade
═══════════════════════════════════════════ */
let activeIdle = vidA;   /* which idle is currently showing */
let nextIdle   = vidB;   /* which idle is queued for next loop */
let _isTalking = false;
let _loopTimer = null;

function scheduleNextLoop(vid) {
  clearTimeout(_loopTimer);
  /* fire LOOP_CROSSFADE seconds before end */
  const delay = Math.max(0, (vid.duration - LOOP_CROSSFADE) * 1000 - (vid.currentTime * 1000));
  _loopTimer = setTimeout(() => {
    if (_isTalking) return; /* don't crossfade while talking */
    /* prep next */
    nextIdle.currentTime = 0;
    nextIdle.play().catch(()=>{});
    /* fade in next, fade out current */
    nextIdle.style.opacity = '1';
    activeIdle.style.opacity = '0';
    /* after transition, swap roles */
    setTimeout(() => {
      activeIdle.pause();
      activeIdle.currentTime = 0;
      activeIdle.style.opacity = '0';
      [activeIdle, nextIdle] = [nextIdle, activeIdle];
      scheduleNextLoop(activeIdle); /* schedule the one after this */
    }, LOOP_CROSSFADE * 1000 + 100);
  }, delay);
}

function startIdleLoop() {
  vidA.style.opacity = '1';
  vidB.style.opacity = '0';
  vidTalk.style.opacity = '0';
  activeIdle = vidA; nextIdle = vidB;
  vidA.currentTime = 0;
  vidA.play().catch(()=>{});
  vidA.addEventListener('loadedmetadata', () => scheduleNextLoop(vidA), {once:true});
  vidA.addEventListener('timeupdate', function loop(){
    /* fallback: if metadata not fired, schedule once duration known */
    if (vidA.duration && !isNaN(vidA.duration)) {
      vidA.removeEventListener('timeupdate', loop);
      scheduleNextLoop(vidA);
    }
  });
}

/* ═══════════════════════════════════════════
   TALKING STATE
═══════════════════════════════════════════ */
let _talkHideTimeout = null;

function startTalking() {
  if (_isTalking) return; _isTalking = true;
  clearTimeout(_loopTimer); clearTimeout(_talkHideTimeout);
  vidTalk.currentTime = 0; vidTalk.play().catch(()=>{});
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    vidTalk.style.opacity = '1';
    activeIdle.style.opacity = '0';
    nextIdle.style.opacity = '0';
    videoFrame.classList.add('talking');
  }));
}

function stopTalking() {
  if (!_isTalking) return; _isTalking = false;
  videoFrame.classList.remove('talking');
  vidTalk.style.opacity = '0';
  activeIdle.style.opacity = '1';
  activeIdle.play().catch(()=>{});
  scheduleNextLoop(activeIdle);
  _talkHideTimeout = setTimeout(()=>{ vidTalk.pause(); vidTalk.currentTime=0; }, 800);
}

/* ═══════════════════════════════════════════
   AUTOPLAY GATE
═══════════════════════════════════════════ */
let audioUnlocked = false;

function unlockAndStart() {
  if (audioUnlocked) return; audioUnlocked = true;
  try {
    const c = new (window.AudioContext||window.webkitAudioContext)();
    const b = c.createBuffer(1,1,22050), s = c.createBufferSource();
    s.buffer=b; s.connect(c.destination); s.start(0);
  } catch(e) {}
  startIdleLoop();
  tapGate.classList.add('hidden');
  setTimeout(()=>tapGate.remove(), 400);
}

/* ═══════════════════════════════════════════
   JUMPING LETTER TYPEWRITER
═══════════════════════════════════════════ */
function buildJumpingText(bubble, text) {
  bubble.innerHTML = '';
  const words = text.split(' '); let ci = 0;
  words.forEach((word, wi) => {
    for (let i = 0; i < word.length; i++) {
      const s = document.createElement('span'); s.className='jump-letter'; s.textContent=word[i];
      s.style.animationDelay=(ci*LETTER_DELAY_MS)+'ms'; s.style.animationDuration=LETTER_DUR_MS+'ms';
      bubble.appendChild(s); ci++;
    }
    if (wi < words.length-1) {
      const sp = document.createElement('span'); sp.className='jump-space'; sp.textContent=' ';
      sp.style.opacity='0'; sp.style.animation=`letterJump ${LETTER_DUR_MS}ms cubic-bezier(0.22,1,0.36,1) ${ci*LETTER_DELAY_MS}ms forwards`;
      bubble.appendChild(sp); ci++;
    }
  });
}

/* ═══════════════════════════════════════════
   PLAY AUDIO RESPONSE
═══════════════════════════════════════════ */
function playResponse(audioB64, pendingBotText) {
  const url = URL.createObjectURL(new Blob([Uint8Array.from(atob(audioB64),c=>c.charCodeAt(0))],{type:'audio/wav'}));
  const aud = new Audio(url);
  aud.onplay   = ()=>{ startTalking(); if(pendingBotText) addMsg('bot',pendingBotText,true,true); };
  aud.onended  = ()=>{ stopTalking(); URL.revokeObjectURL(url); };
  aud.onerror  = ()=>{ stopTalking(); URL.revokeObjectURL(url); if(pendingBotText) addMsg('bot',pendingBotText); };
  aud.play().catch(()=>{ const r=()=>{aud.play().catch(()=>{}); document.removeEventListener('click',r);}; document.addEventListener('click',r); });
}

/* ═══════════════════════════════════════════
   PIPELINES
═══════════════════════════════════════════ */
async function processVoiceFull(audioBlob) {
  const form = new FormData(); form.append('file',audioBlob,'audio.webm');
  try {
    const {transcript} = await(await fetch('/stt',{method:'POST',body:form})).json();
    if (!transcript?.trim()) { resetSpeakBtn(); return; }
    hideEmpty(); addMsg('user', transcript.trim());
    const {reply} = await(await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:transcript.trim()})})).json();
    const {audio} = await(await fetch('/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:reply})})).json();
    resetSpeakBtn(); playResponse(audio, reply);
  } catch(e) { resetSpeakBtn(); addMsg('bot','Something went wrong. Please try again.'); }
}

async function processTextOnly(userText) {
  hideEmpty(); addMsg('user', userText);
  const typingEl = showTyping();
  try {
    const {reply} = await(await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:userText})})).json();
    removeTyping(typingEl); addMsg('bot', reply, false, true);
  } catch(e) { removeTyping(typingEl); addMsg('bot','Something went wrong. Please try again.'); }
}

/* ═══════════════════════════════════════════
   SPEAK BUTTON
═══════════════════════════════════════════ */
let speakRecording=false,speakMediaRec,speakChunks=[],speakStream,speakSilTimer=null,speakRafId,speakAnalyser,speakAudioCtx;
async function toggleSpeakMode(){speakRecording?stopSpeakRecording():startSpeakRecording();}
async function startSpeakRecording(){
  speakRecording=true; speakChunks=[];
  speakBtn.classList.add('recording'); speakLabel.textContent='Tap to stop';
  try{
    speakStream=await navigator.mediaDevices.getUserMedia({audio:true});
    speakAudioCtx=new AudioContext(); speakAnalyser=speakAudioCtx.createAnalyser(); speakAnalyser.fftSize=256;
    speakAudioCtx.createMediaStreamSource(speakStream).connect(speakAnalyser);
    const buf=new Uint8Array(speakAnalyser.fftSize);
    function monitor(){
      if(!speakRecording)return;
      speakAnalyser.getByteTimeDomainData(buf);
      const amp=buf.reduce((m,v)=>Math.max(m,Math.abs(v-128)),0);
      if(amp<SILENCE_THR){if(!speakSilTimer)speakSilTimer=setTimeout(()=>{if(speakRecording)stopSpeakRecording();},SILENCE_MS);}
      else{clearTimeout(speakSilTimer);speakSilTimer=null;}
      speakRafId=requestAnimationFrame(monitor);
    }
    monitor();
    speakMediaRec=new MediaRecorder(speakStream);
    speakMediaRec.ondataavailable=e=>speakChunks.push(e.data);
    speakMediaRec.onstop=()=>processVoiceFull(new Blob(speakChunks,{type:'audio/webm'}));
    speakMediaRec.start();
  }catch(e){resetSpeakBtn();}
}
function stopSpeakRecording(){
  speakRecording=false; clearTimeout(speakSilTimer); speakSilTimer=null; cancelAnimationFrame(speakRafId);
  speakLabel.textContent='Processing…'; speakBtn.classList.remove('recording');
  speakBtn.style.opacity='0.6'; speakBtn.disabled=true;
  if(speakMediaRec&&speakMediaRec.state!=='inactive')speakMediaRec.stop();
  speakStream?.getTracks().forEach(t=>t.stop());
}
function resetSpeakBtn(){speakLabel.textContent='Speak with Sophia'; speakBtn.classList.remove('recording'); speakBtn.style.opacity=''; speakBtn.disabled=false;}

/* ═══════════════════════════════════════════
   CHAT MIC
═══════════════════════════════════════════ */
let chatMicRecording=false,chatMediaRec,chatChunks=[],chatStream,chatSilTimer=null,chatRafId,chatAnalyser,chatAudioCtx;
async function toggleChatMic(){chatMicRecording?stopChatMic():startChatMic();}
async function startChatMic(){
  chatMicRecording=true; chatChunks=[];
  chatMicBtn.classList.add('recording'); volWrap.classList.add('active'); textInput.placeholder='Listening…';
  try{
    chatStream=await navigator.mediaDevices.getUserMedia({audio:true});
    chatAudioCtx=new AudioContext(); chatAnalyser=chatAudioCtx.createAnalyser(); chatAnalyser.fftSize=256;
    chatAudioCtx.createMediaStreamSource(chatStream).connect(chatAnalyser);
    const buf=new Uint8Array(chatAnalyser.fftSize),sH=[4,8,14,8,4];
    function monitor(){
      if(!chatMicRecording)return;
      chatAnalyser.getByteTimeDomainData(buf);
      const amp=buf.reduce((m,v)=>Math.max(m,Math.abs(v-128)),0),e=Math.min(1,amp/40);
      vSticks.forEach((s,i)=>{s.style.height=Math.round(sH[i]+e*(20-sH[i])*(0.6+Math.random()*0.4))+'px';});
      if(amp<SILENCE_THR){if(!chatSilTimer)chatSilTimer=setTimeout(()=>{if(chatMicRecording)stopChatMic();},SILENCE_MS);}
      else{clearTimeout(chatSilTimer);chatSilTimer=null;}
      chatRafId=requestAnimationFrame(monitor);
    }
    monitor();
    chatMediaRec=new MediaRecorder(chatStream);
    chatMediaRec.ondataavailable=e=>chatChunks.push(e.data);
    chatMediaRec.onstop=async()=>{await transcribeAndSendText(new Blob(chatChunks,{type:'audio/webm'}));};
    chatMediaRec.start();
  }catch(e){resetChatMic();}
}
function stopChatMic(){
  chatMicRecording=false; clearTimeout(chatSilTimer); chatSilTimer=null; cancelAnimationFrame(chatRafId);
  if(chatMediaRec&&chatMediaRec.state!=='inactive')chatMediaRec.stop();
  chatStream?.getTracks().forEach(t=>t.stop()); resetChatMic();
}
function resetChatMic(){chatMicBtn.classList.remove('recording'); volWrap.classList.remove('active'); textInput.placeholder='Type a message…'; vSticks.forEach(s=>s.style.height='4px');}
async function transcribeAndSendText(blob){
  const form=new FormData(); form.append('file',blob,'audio.webm');
  try{const{transcript}=await(await fetch('/stt',{method:'POST',body:form})).json(); if(transcript?.trim())await processTextOnly(transcript.trim());}
  catch(e){addMsg('bot','Could not transcribe. Please try again.');}
}

/* ═══════════════════════════════════════════
   SEND TEXT
═══════════════════════════════════════════ */
function sendText(){const v=textInput.value.trim(); if(!v)return; textInput.value=''; processTextOnly(v);}
textInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText();}});

/* ═══════════════════════════════════════════
   CHAT UI HELPERS
═══════════════════════════════════════════ */
function hideEmpty(){if(emptyState?.parentNode)emptyState.remove();}

let _lastRole = null;

function addMsg(role, text, reveal=false, jumping=false) {
  const now = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const isNewSender = role !== _lastRole;
  _lastRole = role;

  const row = document.createElement('div');
  row.className = `msg-row ${role}${reveal?' reveal':''}`;

  if (role === 'bot') {
    /* avatar — show only on first message from bot in a sequence */
    const av = document.createElement('div');
    av.className = isNewSender ? 'msg-avatar' : 'msg-avatar ghost';
    av.textContent = 'S';
    row.appendChild(av);
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  row.appendChild(bubble);
  chatWrap.appendChild(row);

  /* time */
  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  const time = document.createElement('span');
  time.className = 'msg-time'; time.textContent = now;
  meta.appendChild(time);
  chatWrap.appendChild(meta);

  if (role==='bot' && jumping) {
    buildJumpingText(bubble, text);
    const iv = setInterval(()=>chatWrap.scrollTop=chatWrap.scrollHeight, 60);
    setTimeout(()=>clearInterval(iv), text.length*LETTER_DELAY_MS+LETTER_DUR_MS+100);
  } else {
    bubble.textContent = text;
  }
  chatWrap.scrollTop = chatWrap.scrollHeight;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'typing-row'; row.id = 'typing-msg';
  const av = document.createElement('div');
  av.className = 'msg-avatar'; av.textContent = 'S';
  const bub = document.createElement('div');
  bub.className = 'typing-bubble';
  bub.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  row.appendChild(av); row.appendChild(bub);
  chatWrap.appendChild(row);
  chatWrap.scrollTop = chatWrap.scrollHeight;
  return row;
}

function removeTyping(el){if(el?.parentNode)el.parentNode.removeChild(el);}
</script>
</body>
</html>
